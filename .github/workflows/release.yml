name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
          GFA_VERSION: ${{ github.ref_name }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          set -euo pipefail

          npm run build

          mkdir -p dist
          chmod +x dist/gfa

          asset_basename="gfa_${VERSION}_${GOOS}_${GOARCH}"

          tar -C dist -czf "dist/${asset_basename}.tar.gz" gfa

      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/gfa_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  checksums:
    name: checksums
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: '*'
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum gfa_* > SHA256SUMS

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v7
        with:
          name: checksums
          path: dist/SHA256SUMS
          if-no-files-found: error

  release:
    name: github-release
    runs-on: ubuntu-latest
    needs:
      - build
      - checksums

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: '*'
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/gfa_*.tar.gz
            dist/SHA256SUMS
